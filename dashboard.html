<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --bg: #e9efec;
      --accent: #a0a08b;
      --dark: #555568;
      --text: #2f2f3a;
      --hover: #d0d6d3;
    }
    body {
      background-color: var(--bg); color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      margin: 0; padding: 15px; height: 100vh; 
      display: flex; flex-direction: column;
      border: 4px solid var(--dark); box-sizing: border-box;
    }
    
    /* Header -*/
    .header { 
      border-bottom: 2px solid var(--dark); 
      padding-bottom: 8px; margin-bottom: 15px; 
      display: grid; 
      grid-template-columns: 1fr 1fr 1fr; 
      align-items: start;
      font-size: 0.85rem; font-weight: bold;
      line-height: 1.4;
    }
    .header > div:nth-child(2) { text-align: center; } /* IP/MASK centered */
    .header > div:nth-child(3) { text-align: right; }  /* Location to the right*/

    .status-ok { color: #4a7c4a; }
    .location { color: var(--dark); }

    /* 2-Columns Layout */
    .main-grid { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 25px; 
      flex-grow: 1; 
      overflow: hidden;
    }

    .panel-title { 
      font-size: 0.8rem; background: var(--dark); color: var(--bg); 
      padding: 2px 8px; margin-bottom: 10px; width: fit-content; 
      font-weight: bold; text-transform: uppercase;
    }
    
    /* Left Col (Telemetry + Log) */
    .left-col { display: flex; flex-direction: column; justify-content: space-between; }
    .telemetry-box { margin-bottom: 10px; }
    .stats-container p { margin: 5px 0; font-size: 0.85rem; }
    .value { font-weight: bold; color: var(--dark); }
    
    .bar-container { margin-top: 15px; }
    .bar-label { font-size: 0.75rem; display: block; margin-bottom: 4px; color: var(--text);}
    .bar-bg { width: 100%; height: 12px; background: var(--hover); border: 1px solid var(--accent); }
    .bar-fill { height: 100%; background: var(--dark); transition: width 0.4s ease-out; }

    .console-wrapper { display: flex; flex-direction: column; flex-grow: 1; justify-content: flex-end; margin-top: 20px;}
    
    /* FIXED Console */
    .console { 
      background: var(--hover); border: 1px solid var(--accent); 
      padding: 10px; font-size: 0.75rem; color: var(--text);
      overflow-y: auto; display: flex; flex-direction: column; 
      height: 180px; 
    }
    .log-entry { 
      border-left: 2px solid var(--dark); padding-left: 8px; 
      margin-bottom: 5px; font-weight: 600;
    }

    /* Right Col (scan archive) */
    .right-col { display: flex; flex-direction: column; }
    .scan-list {
      background: var(--bg); border: 1px solid var(--accent);
      flex-grow: 1; overflow-y: auto; padding: 5px;
    }
    .scan-item {
      padding: 10px; border-bottom: 1px solid var(--hover);
      cursor: pointer; font-size: 0.8rem; display: flex; align-items: center;
      transition: background 0.2s;
    }
    .scan-item:hover { background-color: var(--hover); color: var(--dark); font-weight: bold; }
    .scan-icon { margin-right: 10px; font-size: 1.1rem;}
  </style>
</head>
<body>
  <div class="header">
    <div>SYS: <span class="status-ok">ONLINE</span><br>CLASS: <span id="skin-type" class="value">UNKNOWN</span></div>
    <div>IP: <span id="local-ip" class="value">AUTO-DETECT</span><br>MASK: <span class="value">/24</span></div>
    <div class="location">[<span id="current-sector">SCANNING SECTOR...</span>]</div>
  </div>

  <div class="main-grid">
    <div class="left-col">
      <div class="telemetry-box">
        <div class="panel-title">SYS. TELEMETRY</div>
        <div class="stats-container">
          <p>LIFE CYCLES: <span id="age" class="value">0</span></p>
          <p>BSSIDs PROCESSED: <span id="eaten" class="value">0</span></p>
        </div>
        <div class="bar-container">
          <span class="bar-label">DATA CAPACITY (HUNGER)</span>
          <div class="bar-bg"><div id="bar-hunger" class="bar-fill" style="width: 0%"></div></div>
        </div>
      </div>

      <div class="console-wrapper">
        <div class="panel-title">TERMINAL LOGS</div>
        <div id="console" class="console"></div>
      </div>
    </div>

    <div class="right-col">
      <div class="panel-title">RECENT PAYLOADS (LAST 5)</div>
      <div id="scan-list" class="scan-list">
      </div>
    </div>
  </div>

  <script>
  if (window.__TAURI__) {
    const { listen } = window.__TAURI__.event;
    const { invoke } = window.__TAURI__.core;
    const { getCurrentWindow } = window.__TAURI__.window;

    const appWindow = getCurrentWindow();
    appWindow.onCloseRequested(async (event) => {
      event.preventDefault(); 
      await appWindow.hide(); 
    });

    document.addEventListener('keydown', async (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key.toLowerCase() === 'd') await appWindow.hide(); 
    });

    document.body.addEventListener('mousedown', (e) => {
      if (e.target.closest('.scan-list') || e.target.closest('.console')) return;
      if (e.button === 0) appWindow.startDragging();
    });

    const addLog = (text, isError = false) => {
      const consoleEl = document.getElementById('console');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      if (isError) entry.style.color = '#ff4444'; // Red for errors 
      const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      entry.innerText = `[${time}] > ${text}`;
      consoleEl.prepend(entry);
      if (consoleEl.childNodes.length > 30) consoleEl.removeChild(consoleEl.lastChild);
    }

    // --- PRE-FLIGHT CHECK ---
    addLog("SYSTEM BOOT SEQUENCE INITIATED...");
    invoke('check_dependencies').then((hasNmap) => {
        if (!hasNmap) {
            addLog("CRITICAL ERROR: NMAP MODULE MISSING.", true);
            addLog("RUN 'sudo pacman -S nmap' OR 'sudo apt install nmap' TO FIX.", true);
        } else {
            addLog("NMAP MODULE DETECTED. READY.");
            addLog("NEURAL LINK ESTABLISHED...");
        }
    });

    const loadScans = async () => {
      try {
        const files = await invoke('list_saved_scans');
        const listEl = document.getElementById('scan-list');
        listEl.innerHTML = ''; 

        if (files.length === 0) {
          listEl.innerHTML = '<div style="padding: 10px; color: var(--dark); font-style: italic;">No payloads archived yet.</div>';
          return;
        }

        const top5Files = files.slice(0, 5);
        top5Files.forEach(file => {
          const item = document.createElement('div');
          item.className = 'scan-item';
          item.innerHTML = `<span class="scan-icon">📄</span> ${file}`;
          item.onclick = () => invoke('open_scan', { fileName: file });
          listEl.appendChild(item);
        });
      } catch (err) {
        console.error("Errore scan:", err);
      }
    };

    loadScans();

    listen('scan-completed', () => loadScans());
    listen('sys-log', (event) => addLog(event.payload));
    listen('netchi-thought', (event) => addLog(event.payload));

    listen('state-update', (event) => {
      const s = event.payload;
      document.getElementById('age').innerText = s.age;
      document.getElementById('eaten').innerText = s.networks_eaten; 
      document.getElementById('current-sector').innerText = s.current_location.toUpperCase();
      document.getElementById('skin-type').innerText = s.skin.toUpperCase();
      document.getElementById('bar-hunger').style.width = s.hunger + '%';
    });
  }
</script>
</body>
</html>
