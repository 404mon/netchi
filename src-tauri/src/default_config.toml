# ==========================================
# NETCHI - CYBERDECK CONFIGURATION FILE
# ==========================================

# Master switch for autonomous NMAP active scans.
allow_active_scans = true

# Target subnet for reconnaissance. 
# 'auto' resolves dynamically (e.g., 192.168.1.0/24).
# Explicit definition supported (e.g., "10.0.0.0/24").
target_subnet = "auto"

# Minimum delay between autonomous active scans (in minutes) to prevent flooding.
scan_cooldown_minutes = 5

# ==========================================
# ENVIRONMENT & SENSITIVITY (AI SENSOR)
# ==========================================
# Defines the threshold of dropped broadcast/mDNS packets per 30s cycle 
# to classify the network topology as 'CROWDED'.
# - Modern 5GHz / Smart Homes: 800 - 1500
# - Quiet / Wired networks: 50 - 200
noise_threshold = 800

# ==========================================
# RECONNAISSANCE ARGUMENTS
# ==========================================
# Arguments passed to the nmap binary for active scans.
# EXAMPLES:
# 1. Fast/Stealth (Default): ["-F", "-T4"]
# 2. Comprehensive (Noisy):  ["-p-", "-T4"]
# 3. Gourmet (OS/Versions):  ["-sV", "-O", "-T3"]

nmap_arguments = ["-F", "-T4"]